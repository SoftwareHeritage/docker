storage:
  cls: cassandra
  hosts:
    - cassandra-seed
  keyspace: swh
  objstorage:
    cls: remote
    url: http://nginx/rpc/objstorage/
  journal_writer:
    cls: kafka
    brokers:
      - kafka
    prefix: swh.journal.objects
    client_id: swh.storage.master
    anonymize: true
  auth_provider: null
